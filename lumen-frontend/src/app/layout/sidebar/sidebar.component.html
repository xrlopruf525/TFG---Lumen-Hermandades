<button class="mobile-menu-trigger" type="button" (click)="toggleSidebar()" aria-label="Abrir menu">
  <span></span>
  <span></span>
  <span></span>
</button>

<div class="sidebar-backdrop" [class.is-visible]="isMobileOpen" (click)="closeMobileSidebar()"></div>

<aside class="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__brand">
      <div class="brand-badge">L</div>
      <div class="brand-text">
        <h5>Lumen Hermandades</h5>
        <p>Panel privado</p>
      </div>
    </div>

    <button class="collapse-btn" type="button" (click)="toggleSidebar()" aria-label="Alternar sidebar">
      <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
        <path d="M9.41 7.41 8 8.83 11.17 12 8 15.17l1.41 1.42L14 12z" />
      </svg>
    </button>
  </div>

  <nav class="sidebar__nav" aria-label="Navegacion principal">
    <a routerLink="/dashboard" routerLinkActive="active-link" class="nav-link-item" (click)="onNavigate()">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>
      </span>
      <span class="nav-label">Dashboard</span>
    </a>

    <a routerLink="/hermandades" routerLinkActive="active-link" class="nav-link-item" (click)="onNavigate()">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4m0 2c-4.42 0-8 1.79-8 4v2h16v-2c0-2.21-3.58-4-8-4z"/></svg>
      </span>
      <span class="nav-label">Hermandades</span>
    </a>

    <a routerLink="/eventos" routerLinkActive="active-link" class="nav-link-item" (click)="onNavigate()">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M7 2h2v2h6V2h2v2h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3zm13 8H4v10h16z"/></svg>
      </span>
      <span class="nav-label">Eventos</span>
    </a>
  </nav>
</aside>
