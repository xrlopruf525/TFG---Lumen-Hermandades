<div class="container-fluid p-4">
  <h2 class="mb-4">Panel principal</h2>

  <div class="row g-3">
    <div class="col-12 col-md-6 col-xl-3" *ngFor="let panel of paneles">
      <div class="card text-white h-100" [ngClass]="panel.color">
        <div class="card-body d-flex flex-column justify-content-center text-center">
          <h3 class="mb-2">{{ panel.valor }}</h3>
          <p class="mb-0">{{ panel.texto }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
