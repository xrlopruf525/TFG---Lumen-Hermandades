<div class="hermanos-container">
  <div class="tabs-header">
    <button
      type="button"
      class="tab-button"
      [class.active]="activeTab === 'hermanos'"
      (click)="mostrarCenso()">
      👥 Gestión de Hermanos
    </button>

    <button
      *ngIf="isAdmin"
      type="button"
      class="tab-button"
      [class.active]="activeTab === 'economica'"
      (click)="mostrarGestionEconomica()">
      💰 Gestión Económica
    </button>

    <button
      type="button"
      class="tab-button"
      [class.active]="activeTab === 'informes'"
      (click)="mostrarInformes()">
      📊 Informes
    </button>
  </div>

  <div class="tabs-content">
    <div *ngIf="activeTab === 'hermanos'" class="tab-pane active">
      <app-censo-list></app-censo-list>
    </div>

    <div *ngIf="activeTab === 'economica' && isAdmin" class="tab-pane active">
      <app-gestion-economica></app-gestion-economica>
    </div>

    <div *ngIf="activeTab === 'informes'" class="tab-pane active">
      <app-informes></app-informes>
    </div>
  </div>
</div>
