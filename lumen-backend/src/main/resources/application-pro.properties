# ==========================================
# Perfil PRO: configuracion para despliegue
# ==========================================

# Conexión a MySQL en entorno local
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


# HikariCP: mayor tolerancia a desconexiones intermitentes de MySQL en desarrollo
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-test-query=SELECT 1

# Estrategia de Hibernate para desarrollo:
# update crea/actualiza tablas sin perder estructura existente cuando es posible
spring.jpa.hibernate.ddl-auto=update

# Muestra sentencias SQL en consola para depuración
spring.jpa.show-sql=true

# Formatea SQL para facilitar la lectura durante desarrollo
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Configuración de correo (Modo Producción SSL)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.protocol=smtps

spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.ssl.enable=true
spring.mail.properties.mail.smtps.ssl.trust=*

spring.mail.properties.mail.debug=true
