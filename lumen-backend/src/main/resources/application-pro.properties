# ==========================================
# Perfil pro (producción / AWS)
# ==========================================

# Conexión a base de datos en AWS (reemplazar placeholders)
spring.datasource.url=jdbc:mysql://<AWS_ENDPOINT>:3306/<AWS_DATABASE>?useSSL=true&serverTimezone=UTC
spring.datasource.username=<AWS_USERNAME>
spring.datasource.password=<AWS_PASSWORD>

# Estrategia de Hibernate para producción:
# validate verifica el esquema sin modificar datos ni estructura
spring.jpa.hibernate.ddl-auto=validate

# Desactiva el log SQL para mejorar rendimiento y reducir ruido en logs
spring.jpa.show-sql=false
