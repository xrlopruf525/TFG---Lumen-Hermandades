# ==========================================
# Perfil local (desarrollo)
# ==========================================

# Conexión a MySQL en entorno local
spring.datasource.url=jdbc:mysql://localhost:3306/lumen_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Estrategia de Hibernate para desarrollo:
# update crea/actualiza tablas sin perder estructura existente cuando es posible
spring.jpa.hibernate.ddl-auto=update

# Muestra sentencias SQL en consola para depuración
spring.jpa.show-sql=true

# Formatea SQL para facilitar la lectura durante desarrollo
spring.jpa.properties.hibernate.format_sql=true
